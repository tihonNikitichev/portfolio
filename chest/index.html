<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сундуки</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
       <h1>Игра Сундуки</h1>
       <p>В одном из трех сундуков спрятаны деньги!<br> Угадай, где они!</p>
       <div class="chests">
        <div class="chest" id="chest1" onclick="openChest(1)">
            <img src="1.png" alt="Сундук1">
        </div>

         <div class="chest" id="chest2" onclick="openChest(2)">
            <img src="1.png" alt="Сундук2">
        </div>

         <div class="chest" id="chest3" onclick="openChest(3)">
            <img src="1.png" alt="Сундук3">
        </div>
       </div>
       <div id="result"></div>
       <button onclick="resetGame()">Играть снова</button>
    </div>
    <script src="script.js"></script>

    
</body>
</html>
