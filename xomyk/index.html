<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Поймай Суши!</title>
    <!-- Подключаем внешние стили CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Поймай Суши! 🍣</h1>
    <div class="score-board">Очки: <span id="score">0</span></div>
    <button id="start-btn">Начать игру</button>

    <!-- Игровое поле 3х3 (9 норок) -->
    <div class="grid">
        <div class="hole" id="h1"></div>
        <div class="hole" id="h2"></div>
        <div class="hole" id="h3"></div>
        <div class="hole" id="h4"></div>
        <div class="hole" id="h5"></div>
        <div class="hole" id="h6"></div>
        <div class="hole" id="h7"></div>
        <div class="hole" id="h8"></div>
        <div class="hole" id="h9"></div>
    </div>
</div>
    <!-- Подключаем логику JavaScript -->
    <script src="script.js"></script>
</body>
</html>
